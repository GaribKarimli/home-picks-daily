name: Daily Content Generation

on:
  schedule:
    - cron: '0 8 * * *'
  workflow_dispatch:
    inputs:
      count:
        description: 'Products per niche'
        required: true
        default: '3'
      niche:
        description: 'Niche (all, home-decor, tech-gadgets, fitness-equipment, kitchen-essentials)'
        required: true
        default: 'all'

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r scripts/requirements.txt

      - name: Generate content
        id: generate
        continue-on-error: true
        run: |
          if [ "${{ github.event.inputs.niche }}" = "all" ] || [ "${{ github.event.inputs.niche }}" = "" ]; then
            FLAG="--all-niches"
          else
            FLAG="--niche ${{ github.event.inputs.niche }}"
          fi

          python -m scripts.main $FLAG --count ${{ github.event.inputs.count || 3 }}
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          AMAZON_TAG: ${{ secrets.AMAZON_TAG || 'dummy-20' }}

      - name: Commit and push new posts
        run: |
          git config user.name "Home Picks Bot"
          git config user.email "bot@homepicks.com"
          git add -A
          git diff --staged --quiet || git commit -m "Auto: daily content $(date +%Y-%m-%d)"
          git push
